name: my_finance
description: Personal finance app for tracking income, expenses, goals, and budgets.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.6
  cloud_functions: ^5.3.4
  firebase_messaging: ^15.2.5

  # Google Sign-In
  google_sign_in: ^6.2.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI & Charts
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

  # Data & serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  collection: ^1.19.1
  intl: ^0.20.2

  # Local notifications
  flutter_local_notifications: ^18.0.1

  # CSV / Excel import / export
  csv: ^6.0.0
  excel: ^4.0.6
  file_picker: ^8.3.7
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  archive: ^3.6.0

  # Utilities
  shared_preferences: ^2.5.3
  crypto: ^3.0.6
  equatable: ^2.0.7

  cupertino_icons: ^1.0.8
  pdfrx: ^1.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5

  # Testing
  mocktail: ^1.0.5
  fake_cloud_firestore: ^3.1.0

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
